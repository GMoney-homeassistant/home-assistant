apiVersion: apps/v1
kind: Deployment
metadata:
  name: z2m
  namespace: home-assistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: z2m
  template:
    metadata:
      labels:
        app: z2m
    spec:
      containers:
      - name: z2m
        image: koenkk/zigbee2mqtt:latest
        env:
          - name: TZ
            value: Pacific/Auckland
          - name: ZIGBEE2MQTT_CONFIG_MQTT_SERVER
            value: "mqtt://mosquitto-service.home-assistant.svc.cluster.local:8883"
          - name: ZIGBEE2MQTT_CONFIG_MQTT_USER
            value: "mqtt-user"
          - name: ZIGBEE2MQTT_CONFIG_MQTT_PASSWORD
            value: "password"
        securityContext:
          privileged: true
        ports:
          - containerPort: 8080
        volumeMounts:
          - name: z2m-data
            mountPath: /app/data
          - name: z2m-udev
            mountPath: /run/udev
          - name: usb-devices
            mountPath: /dev/bus/usb
          - name: dev-ttyacm
            mountPath: /dev/ttyACM0
      volumes:
        - name: z2m-data
          persistentVolumeClaim:
            claimName: z2m-data
        - name: z2m-udev
          hostPath:
            path: /run/udev
        - name: usb-devices
          hostPath:
            path: /dev/bus/usb
        - name: dev-ttyacm
          hostPath:
            path: /dev/ttyACM0
            type: CharDevice
